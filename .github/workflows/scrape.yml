name: Scrape Beauty Deals

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 feedparser

      - name: Run scraper
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scraper.py

      - name: Commit updated deals
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if git diff --quiet deals.json; then
            echo "No changes to commit"
            exit 0
          fi
          git add deals.json
          git commit -m "chore: update deals [skip ci]"
          for i in 1 2 3; do
            git push origin HEAD:main && break
            echo "Push attempt $i failed, rebasing and retrying..."
            git fetch origin main
            git rebase origin/main
          done
