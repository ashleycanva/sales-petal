name: Scrape Beauty Deals

on:
  schedule:
    - cron: '0 10 */2 * *'   # every 2 days at 10am UTC
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 anthropic

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper.py

      - name: Commit updated deals
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if git diff --quiet deals.json; then
            echo "No changes to commit"
            exit 0
          fi
          git add deals.json
          git commit -m "chore: update deals [skip ci]"
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed — syncing with remote..."
            git fetch origin main
            git rebase origin/main
          done
          exit 1
