<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Sale Petal</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#F7F1EB"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Sale Petal"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F7F1EB;--surface:#FCF9F5;--line:#E3D6C7;--line-soft:#F0E8DF;
  --ink:#2B2724;--ink2:#6E6259;--ink3:#B5A89B;
  --clay:#C98B7A;--clay-light:#FFF5EE;--clay-border:#E8C9A8;
  --sale:#2D7A4F;--sale-bg:#E6F4EC;
  --alert:#8B6B4A;--code-bg:#2B2724;
}
html,body{height:100%;overflow:hidden}
body{font-family:"Archivo",sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;max-width:480px;margin:0 auto}

/* ── Top bar ── */
.topbar{padding:env(safe-area-inset-top,0) 18px 0;background:var(--bg);flex-shrink:0}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0 4px}
.logo{font-family:"Anton",sans-serif;font-size:28px;text-transform:uppercase;letter-spacing:.02em;color:var(--ink)}
.logo span{color:var(--clay)}
.topbar-right{display:flex;align-items:center;gap:8px}
.icon-btn{width:34px;height:34px;border-radius:50%;background:transparent;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink3);font-size:18px;transition:background .15s}
.icon-btn:hover,.icon-btn:active{background:var(--line-soft)}
.last-upd{font-size:11px;color:var(--ink3);padding-bottom:10px}

/* ── Scroll area ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 14px 16px}

/* ── Bottom nav ── */
.bottomnav{flex-shrink:0;background:var(--surface);border-top:.5px solid var(--line);display:flex;padding:6px 0 calc(6px + env(safe-area-inset-bottom,0))}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 0;background:none;border:none;transition:opacity .15s}
.tab i{font-size:22px;transition:color .15s}
.tab span{font-size:10px;font-weight:600;letter-spacing:.04em;transition:color .15s}
.tab.on i,.tab.on span{color:var(--clay)}
.tab:not(.on) i,.tab:not(.on) span{color:var(--ink3)}

/* ── View ── */
.view{display:none}
.view.on{display:block}

/* ── Section label ── */
.sec{font-size:10px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:var(--ink3);margin:18px 2px 10px;display:block}

/* ── Brand card ── */
.bcard{background:var(--surface);border:.5px solid var(--line);border-radius:16px;margin-bottom:10px;overflow:hidden}
.bcard-head{padding:13px 14px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.bcard-name{font-family:"Anton",sans-serif;font-size:19px;text-transform:uppercase;letter-spacing:.02em;color:var(--ink);line-height:1.1}
.bcard-url{font-size:10px;color:var(--ink3);margin-top:3px}
.visit-pill{display:inline-flex;align-items:center;gap:4px;background:var(--line-soft);border-radius:100px;padding:5px 11px;font-size:11px;font-weight:600;color:var(--ink2);text-decoration:none;white-space:nowrap;flex-shrink:0}
.bcard-deals{padding:10px 14px 13px;display:flex;flex-direction:column;gap:7px}
.deal-chip{background:var(--clay-light);border-radius:10px;padding:9px 11px;display:flex;align-items:flex-start;gap:8px}
.deal-chip i{font-size:14px;color:var(--clay);flex-shrink:0;margin-top:1px}
.dc-text{font-size:12.5px;font-weight:500;color:var(--ink);line-height:1.4}
.dc-code{display:inline-flex;align-items:center;gap:5px;background:var(--code-bg);color:#F7F1EB;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:.08em;margin-top:4px;cursor:pointer}
.dc-code i{font-size:11px;opacity:.6}
.dc-expiry{font-size:10px;color:var(--ink3);margin-top:3px}
.no-promo{padding:8px 14px 13px;font-size:12px;color:var(--ink3);font-style:italic}

/* ── Product card ── */
.pcard{background:var(--surface);border:.5px solid var(--line);border-radius:16px;margin-bottom:10px;overflow:hidden}
.pcard-head{padding:12px 14px 8px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.pcard-name{font-size:14px;font-weight:600;color:var(--ink);line-height:1.3}
.pcard-brand{font-size:10.5px;color:var(--ink3);font-weight:500;margin-top:2px}
.alert-bar{margin:0 14px 9px;background:var(--clay-light);border:.5px solid var(--clay-border);border-radius:10px;padding:8px 10px;display:flex;align-items:flex-start;gap:7px}
.ab-icon{font-size:13px;color:var(--clay);flex-shrink:0;margin-top:1px}
.ab-label{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--clay);margin-bottom:2px}
.ab-text{font-size:11.5px;font-weight:500;color:var(--alert);line-height:1.35}
.retailers{border-top:.5px solid var(--line)}
.ret-row{padding:9px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:.5px solid var(--line-soft)}
.ret-row:last-child{border-bottom:none}
.ret-name{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);width:62px;flex-shrink:0}
.ret-prices{display:flex;align-items:center;gap:5px;flex:1}
.sale-price{font-size:13px;font-weight:700;color:var(--sale)}
.orig-price{font-size:11px;color:var(--ink3);text-decoration:line-through}
.sale-badge{background:var(--sale-bg);color:var(--sale);font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:100px;letter-spacing:.04em}
.reg-price{font-size:13px;color:var(--ink)}
.no-sale{font-size:12px;color:var(--ink3)}
.ret-link{font-size:11px;font-weight:600;color:var(--clay);text-decoration:none;display:flex;align-items:center;gap:3px;flex-shrink:0;white-space:nowrap}
.ret-link i{font-size:12px}

/* ── My List styles ── */
.settings-box,.add-box{background:var(--surface);border:.5px solid var(--line);border-radius:14px;padding:13px;margin-bottom:10px}
.field-label{font-size:10.5px;font-weight:600;color:var(--ink3);letter-spacing:.06em;margin-bottom:5px;display:block}
.field-input{width:100%;background:var(--line-soft);border:none;border-radius:8px;padding:9px 12px;font-family:"Archivo",sans-serif;font-size:13px;color:var(--ink);outline:none;margin-bottom:6px;display:block}
.field-input:focus{outline:1.5px solid var(--clay)}
.field-input::placeholder{color:var(--ink3)}
.field-input:last-of-type{margin-bottom:10px}
.row-end{display:flex;justify-content:flex-end}
.save-btn{background:var(--clay);color:#fff;border:none;border-radius:100px;padding:8px 18px;font-family:"Archivo",sans-serif;font-size:12.5px;font-weight:700;cursor:pointer}
.save-btn:hover{opacity:.9}
.add-btn{background:var(--ink);color:var(--bg);border:none;border-radius:100px;padding:8px 16px;font-family:"Archivo",sans-serif;font-size:12.5px;font-weight:700;cursor:pointer}
.add-btn:hover{background:var(--clay)}
.list-item{background:var(--surface);border:.5px solid var(--line);border-radius:12px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.li-name{font-size:13px;font-weight:600;color:var(--ink)}
.li-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.li-remove{width:28px;height:28px;border-radius:50%;background:var(--line-soft);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--ink3);font-size:14px}
.li-remove:hover{background:#F4DEDE;color:#A33}

/* ── Refresh button ── */
.refresh-wrap{position:fixed;bottom:calc(60px + env(safe-area-inset-bottom,0));left:50%;transform:translateX(-50%);pointer-events:none;z-index:10}
.refresh-btn{pointer-events:all;background:var(--ink);color:var(--bg);border:none;border-radius:100px;padding:11px 26px;font-family:"Archivo",sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(43,39,36,.25);transition:transform .15s,opacity .15s}
.refresh-btn:hover{transform:translateY(-1px)}
.refresh-btn:disabled{opacity:.5;cursor:default}
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Toast ── */
.toast{position:fixed;bottom:calc(70px + env(safe-area-inset-bottom,0));left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:9px 18px;border-radius:100px;font-size:12.5px;font-weight:600;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:fadein .25s ease;pointer-events:none}

/* ── Empty state ── */
.empty{text-align:center;padding:30px 20px}
.empty i{font-size:36px;color:var(--line);display:block;margin-bottom:8px}
.empty p{font-size:13px;color:var(--ink3);line-height:1.6}

/* ── Skeleton ── */
.sk{background:var(--surface);border:.5px solid var(--line);border-radius:16px;padding:16px;margin-bottom:10px}
.sk-line{height:11px;border-radius:6px;background:linear-gradient(90deg,var(--line-soft) 25%,var(--line) 50%,var(--line-soft) 75%);background-size:200% 100%;animation:shimmer 1.3s infinite;margin-bottom:8px}
@keyframes shimmer{to{background-position:-200% 0}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">Sale <span>Petal</span></div>
    <div class="topbar-right">
      <button class="icon-btn" id="refreshBtn" title="Refresh"><i class="ti ti-refresh"></i></button>
    </div>
  </div>
  <div class="last-upd" id="lastUpd"></div>
</div>

<div class="scroll" id="scroll">

  <!-- DEALS VIEW -->
  <div class="view on" id="view-deals">
    <span class="sec">Brand deals</span>
    <div id="brandsGrid">
      <div class="sk"><div class="sk-line" style="width:40%"></div><div class="sk-line" style="width:65%"></div><div class="sk-line" style="width:50%"></div></div>
      <div class="sk"><div class="sk-line" style="width:35%"></div><div class="sk-line" style="width:55%"></div></div>
    </div>
    <span class="sec">Your products</span>
    <div id="productsGrid">
      <div class="sk"><div class="sk-line" style="width:55%"></div><div class="sk-line" style="width:35%"></div><div class="sk-line" style="width:70%"></div></div>
      <div class="sk"><div class="sk-line" style="width:48%"></div><div class="sk-line" style="width:60%"></div></div>
    </div>
  </div>

  <!-- MY LIST VIEW -->
  <div class="view" id="view-list">

    <span class="sec">Settings</span>
    <div class="settings-box">
      <label class="field-label">GitHub personal access token</label>
      <input class="field-input" type="password" id="patInput" placeholder="github_pat_..."/>
      <div class="row-end"><button class="save-btn" id="savePat">Save token</button></div>
      <div style="margin-top:9px;font-size:11px;color:var(--ink3);line-height:1.55">
        Needed to add/remove items. &nbsp;<a href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noopener" style="color:var(--clay);font-weight:600">Generate token</a> &rarr; select <b>sales-petal</b> repo &rarr; Contents: Read &amp; Write.
      </div>
    </div>

    <span class="sec">Products</span>
    <div class="add-box">
      <input class="field-input" type="text" id="pName" placeholder="Product name (e.g. Pillow Talk Lipstick)"/>
      <input class="field-input" type="text" id="pBrand" placeholder="Brand (e.g. Charlotte Tilbury)"/>
      <div class="row-end"><button class="add-btn" id="addPBtn">+ Add product</button></div>
    </div>
    <div id="productsList"></div>

    <span class="sec" style="margin-top:20px">Brands</span>
    <div class="add-box">
      <input class="field-input" type="text" id="bName" placeholder="Brand name (e.g. Charlotte Tilbury)"/>
      <input class="field-input" type="text" id="bUrl" placeholder="Homepage URL (e.g. charlottetilbury.com)"/>
      <div class="row-end"><button class="add-btn" id="addBBtn">+ Add brand</button></div>
    </div>
    <div id="brandsList"></div>

  </div>
</div>

<div class="refresh-wrap">
  <button class="refresh-btn" id="refreshDeals"><span id="refreshLabel">Refresh deals</span></button>
</div>

<div class="bottomnav">
  <button class="tab on" id="tab-deals" onclick="switchTab('deals')">
    <i class="ti ti-sparkles"></i>
    <span>Deals</span>
  </button>
  <button class="tab" id="tab-list" onclick="switchTab('list')">
    <i class="ti ti-heart"></i>
    <span>My List</span>
  </button>
</div>

<script>
var REPO = 'ashleycanva/sales-petal';
var BASE = '/sales-petal';
var config = {products:[], brands:[]};
var deals = {products:[], brands:[]};
var busy = false;

function ge(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function norm(s){ return String(s||'').toLowerCase().trim(); }

function toast(msg,ok){
  var el=document.querySelector('.toast');if(el)el.remove();
  var t=document.createElement('div');t.className='toast';t.textContent=msg;
  if(!ok)t.style.background='#B5704F';
  document.body.appendChild(t);
  setTimeout(function(){t.remove();},2600);
}

/* ── Tab switch ── */
function switchTab(name){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  ge('view-'+name).classList.add('on');
  ge('tab-'+name).classList.add('on');
  ge('scroll').scrollTop=0;
  if(name==='list') renderList();
}

/* ── Settings ── */
window.addEventListener('DOMContentLoaded',function(){
  var pat=localStorage.getItem('gh-pat');
  if(pat) ge('patInput').value=pat;
});
ge('savePat').onclick=function(){
  var v=ge('patInput').value.trim();
  if(!v){toast('Paste your GitHub token first',false);return;}
  localStorage.setItem('gh-pat',v);
  toast('Token saved',true);
};

/* ── GitHub API ── */
async function ghGet(path){
  var headers={'Accept':'application/vnd.github+json'};
  var pat=localStorage.getItem('gh-pat');
  if(pat)headers['Authorization']='Bearer '+pat;
  var r=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+path,{headers:headers});
  if(!r.ok)throw new Error('GitHub '+r.status);
  return r.json();
}
async function ghPut(path,obj,sha,msg){
  var pat=localStorage.getItem('gh-pat');
  if(!pat)throw new Error('Add your GitHub token in My List > Settings first.');
  var b64=btoa(unescape(encodeURIComponent(JSON.stringify(obj,null,2))));
  var r=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+path,{
    method:'PUT',
    headers:{'Authorization':'Bearer '+pat,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
    body:JSON.stringify({message:msg,content:b64,sha:sha})
  });
  if(!r.ok){var e=await r.json().catch(function(){return{};}); throw new Error(e.message||'GitHub error');}
  return r.json();
}
async function saveConfig(msg){
  var file=await ghGet('user-config.json');
  await ghPut('user-config.json',config,file.sha,msg);
}

/* ── Render deals tab ── */
function renderBrands(){
  var el=ge('brandsGrid');
  var brds=config.brands||[];
  if(!brds.length){
    el.innerHTML='<div class="empty"><i class="ti ti-building-store"></i><p>No brands added yet.<br>Go to My List to add one.</p></div>';
    return;
  }
  var dmap={};
  (deals.brands||[]).forEach(function(b){dmap[norm(b.name)]=b;});
  el.innerHTML='';
  brds.forEach(function(b,i){
    var d=dmap[norm(b.name)]||{};
    var dealList=d.deals||[];
    var card=document.createElement('div');
    card.className='bcard';
    card.style.animationDelay=(i*0.05)+'s';
    var url=b.url||d.url||'';
    var displayUrl=url.replace(/^https?:\/\//,'').replace(/\/$/,'');
    var visitHtml=url?'<a class="visit-pill" href="'+esc(url)+'" target="_blank" rel="noopener">Visit <i class="ti ti-arrow-right"></i></a>':'';
    var dealsHtml='';
    if(dealList.length){
      dealsHtml='<div class="bcard-deals">';
      dealList.forEach(function(deal){
        var icon={'promo_code':'ti-tag','bogo':'ti-gift','gwp':'ti-gift','sale_event':'ti-discount','free_shipping':'ti-truck'}[deal.type]||'ti-star';
        var codeHtml=deal.code?'<div><span class="dc-code" onclick="copyCode(\''+esc(deal.code)+'\')" title="Copy code"><i class="ti ti-copy"></i>'+esc(deal.code)+'</span></div>':'';
        var expiryHtml=deal.expiry?'<div class="dc-expiry">Ends '+esc(deal.expiry)+'</div>':'';
        dealsHtml+='<div class="deal-chip"><i class="ti '+icon+'"></i><div><div class="dc-text">'+esc(deal.text)+'</div>'+codeHtml+expiryHtml+'</div></div>';
      });
      dealsHtml+='</div>';
    } else if(d.summary){
      dealsHtml='<div class="bcard-deals"><div class="deal-chip"><i class="ti ti-star"></i><div class="dc-text">'+esc(d.summary)+'</div></div></div>';
    } else {
      dealsHtml='<div class="no-promo">No active promotions right now</div>';
    }
    card.innerHTML='<div class="bcard-head"><div><div class="bcard-name">'+esc(b.name)+'</div><div class="bcard-url">'+esc(displayUrl)+'</div></div>'+visitHtml+'</div>'+dealsHtml;
    el.appendChild(card);
  });
}

function renderProducts(){
  var el=ge('productsGrid');
  var prods=config.products||[];
  if(!prods.length){
    el.innerHTML='<div class="empty"><i class="ti ti-heart"></i><p>No products added yet.<br>Go to My List to add one.</p></div>';
    return;
  }
  var dmap={};
  (deals.products||[]).forEach(function(p){dmap[norm(p.name)]=p;});
  el.innerHTML='';
  prods.forEach(function(p,i){
    var d=dmap[norm(p.name)]||{};
    var retailers=d.retailers||[];
    var alert=d.brand_promo_alert||'';
    var card=document.createElement('div');
    card.className='pcard';
    card.style.animationDelay=(i*0.05)+'s';
    var alertHtml='';
    if(alert){
      alertHtml='<div class="alert-bar"><i class="ti ti-bell-ringing ab-icon"></i><div><div class="ab-label">'+esc(p.brand)+' promo</div><div class="ab-text">'+esc(alert)+'</div></div></div>';
    }
    var retHtml='';
    if(retailers.length){
      retHtml='<div class="retailers">';
      retailers.forEach(function(r){
        var priceHtml='';
        if(r.on_sale&&r.sale_price){
          priceHtml='<span class="sale-price">'+esc(r.sale_price)+'</span>'+(r.original_price?'<span class="orig-price">'+esc(r.original_price)+'</span>':'')+(r.discount?'<span class="sale-badge">'+esc(r.discount)+'</span>':'');
        } else if(r.original_price){
          priceHtml='<span class="reg-price">'+esc(r.original_price)+'</span>';
        } else {
          priceHtml='<span class="no-sale">Not on sale</span>';
        }
        var link=r.url?'<a class="ret-link" href="'+esc(r.url)+'" target="_blank" rel="noopener">View <i class="ti ti-arrow-right"></i></a>':'';
        retHtml+='<div class="ret-row"><span class="ret-name">'+esc(r.retailer)+'</span><div class="ret-prices">'+priceHtml+'</div>'+link+'</div>';
      });
      retHtml+='</div>';
    }
    card.innerHTML='<div class="pcard-head"><div><div class="pcard-name">'+esc(p.name)+'</div><div class="pcard-brand">'+esc(p.brand)+'</div></div></div>'+alertHtml+retHtml;
    el.appendChild(card);
  });
}

/* ── Render My List tab ── */
function renderList(){
  var pl=ge('productsList');
  var bl=ge('brandsList');
  pl.innerHTML='';
  bl.innerHTML='';
  (config.products||[]).forEach(function(p,i){
    var li=document.createElement('div');li.className='list-item';
    li.innerHTML='<div><div class="li-name">'+esc(p.name)+'</div><div class="li-sub">'+esc(p.brand)+'</div></div>'
      +'<button class="li-remove" data-section="products" data-i="'+i+'" title="Remove"><i class="ti ti-x"></i></button>';
    pl.appendChild(li);
  });
  if(!(config.products||[]).length) pl.innerHTML='<div style="font-size:12px;color:var(--ink3);padding:4px 2px">No products yet.</div>';
  (config.brands||[]).forEach(function(b,i){
    var li=document.createElement('div');li.className='list-item';
    var disp=(b.url||'').replace(/^https?:\/\//,'').replace(/\/$/,'');
    li.innerHTML='<div><div class="li-name">'+esc(b.name)+'</div><div class="li-sub">'+esc(disp)+'</div></div>'
      +'<button class="li-remove" data-section="brands" data-i="'+i+'" title="Remove"><i class="ti ti-x"></i></button>';
    bl.appendChild(li);
  });
  if(!(config.brands||[]).length) bl.innerHTML='<div style="font-size:12px;color:var(--ink3);padding:4px 2px">No brands yet.</div>';
  document.querySelectorAll('.li-remove').forEach(function(btn){
    btn.onclick=async function(){
      var sec=btn.dataset.section;var idx=+btn.dataset.i;
      config[sec].splice(idx,1);renderList();
      try{await saveConfig('remove from '+sec);toast('Removed',true);}
      catch(e){toast(e.message,false);}
    };
  });
}

/* ── Add product ── */
ge('addPBtn').onclick=async function(){
  var name=ge('pName').value.trim();var brand=ge('pBrand').value.trim();
  if(!name){toast('Enter a product name',false);return;}
  if(!brand){toast('Enter the brand',false);return;}
  config.products.push({name:name,brand:brand});
  ge('pName').value='';ge('pBrand').value='';
  renderList();
  try{await saveConfig('add product: '+name);toast('Added — scraper will check it next run',true);}
  catch(e){config.products.pop();renderList();toast(e.message,false);}
};
ge('pName').addEventListener('keydown',function(e){if(e.key==='Enter')ge('pBrand').focus();});
ge('pBrand').addEventListener('keydown',function(e){if(e.key==='Enter')ge('addPBtn').click();});

/* ── Add brand ── */
ge('addBBtn').onclick=async function(){
  var name=ge('bName').value.trim();var url=ge('bUrl').value.trim();
  if(!name){toast('Enter a brand name',false);return;}
  if(!url){toast('Enter the homepage URL',false);return;}
  if(!/^https?:\/\//i.test(url))url='https://'+url;
  config.brands.push({name:name,url:url});
  ge('bName').value='';ge('bUrl').value='';
  renderList();
  try{await saveConfig('add brand: '+name);toast('Added — scraper will check it next run',true);}
  catch(e){config.brands.pop();renderList();toast(e.message,false);}
};
ge('bName').addEventListener('keydown',function(e){if(e.key==='Enter')ge('bUrl').focus();});
ge('bUrl').addEventListener('keydown',function(e){if(e.key==='Enter')ge('addBBtn').click();});

/* ── Copy code ── */
window.copyCode=function(code){
  navigator.clipboard&&navigator.clipboard.writeText(code).then(function(){toast('Copied: '+code,true);}).catch(function(){toast(code,true);});
};

/* ── Load data ── */
async function loadAll(spinner){
  if(busy)return;busy=true;
  var btn=ge('refreshDeals'),lbl=ge('refreshLabel');
  btn.disabled=true;
  if(spinner){lbl.textContent='Checking...';btn.insertAdjacentHTML('afterbegin','<span class="spin"></span>');}
  try{
    var nc=Date.now();
    var [cr,dr]=await Promise.all([
      fetch(BASE+'/user-config.json?nc='+nc,{cache:'no-store'}),
      fetch(BASE+'/deals.json?nc='+nc,{cache:'no-store'})
    ]);
    if(cr.ok)config=await cr.json();
    if(dr.ok){
      deals=await dr.json();
      if(deals.updatedAt){
        var d=new Date(deals.updatedAt);
        ge('lastUpd').textContent='Checked '+d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' at '+d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
      }
    }
    renderBrands();renderProducts();
    if(spinner)toast('Deals refreshed',true);
    setTimeout(maybeNotif,1200);
  } catch(e){
    toast('Could not load: '+e.message,false);
  } finally{
    busy=false;btn.disabled=false;
    var s=btn.querySelector('.spin');if(s)s.remove();
    lbl.textContent='Refresh deals';
  }
}

ge('refreshBtn').onclick=function(){busy=false;loadAll(true);};
ge('refreshDeals').onclick=function(){busy=false;loadAll(true);};

/* ── Service worker ── */
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('service-worker.js').catch(function(e){console.warn('SW:',e);});
  });
}

/* ── Notifications ── */
async function registerSync(){
  try{var r=await navigator.serviceWorker.ready;if('periodicSync' in r)await r.periodicSync.register('check-deals',{minInterval:4*60*60*1000});}
  catch(e){console.warn('sync:',e);}
}
function maybeNotif(){
  if(!('Notification' in window)||Notification.permission!=='default'||localStorage.getItem('notif-off'))return;
  var b=document.createElement('div');
  b.style.cssText='position:fixed;bottom:72px;left:14px;right:14px;background:#2B2724;color:#F7F1EB;border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;font-size:13px;z-index:99;animation:fadein .3s ease;box-shadow:0 6px 24px rgba(0,0,0,.2)';
  b.innerHTML='<i class="ti ti-bell" style="font-size:20px;color:#C98B7A;flex-shrink:0"></i>'
    +'<span style="flex:1;line-height:1.4">Get notified when brands run a promo.</span>'
    +'<div style="display:flex;gap:6px;flex-shrink:0">'
    +'<button id="nb-yes" style="background:#C98B7A;color:#fff;border:none;border-radius:100px;padding:7px 13px;font-family:Archivo,sans-serif;font-size:12px;font-weight:700;cursor:pointer">Allow</button>'
    +'<button id="nb-no" style="background:rgba(255,255,255,.1);color:#F7F1EB;border:none;border-radius:100px;padding:7px 11px;font-family:Archivo,sans-serif;font-size:12px;cursor:pointer">Later</button>'
    +'</div>';
  document.body.appendChild(b);
  document.getElementById('nb-yes').onclick=function(){
    Notification.requestPermission().then(function(p){if(p==='granted')registerSync();b.remove();});
  };
  document.getElementById('nb-no').onclick=function(){localStorage.setItem('notif-off','1');b.remove();};
}
if(typeof Notification!=='undefined'&&Notification.permission==='granted')registerSync();

loadAll(false);
</script>
</body>
</html>
