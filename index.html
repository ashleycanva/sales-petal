<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Sale Petal — beauty sale tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #F6F0E9; --cream-deep: #EFE6DB; --paper: #FCF9F5;
    --clay: #C98B7A; --clay-soft: #E2B7A8; --rose: #D9A39A; --sand: #E8DCCB;
    --ink: #2B2724; --ink-soft: #6E6259; --gold: #B79B6E; --line: #E3D6C7;
    --shadow: rgba(120, 95, 78, 0.12); --new: #B5704F;
    --display: 'Anton', sans-serif; --body: 'Archivo', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: var(--body);
    background:
      radial-gradient(120% 80% at 80% -10%, #F3E4D9 0%, transparent 55%),
      radial-gradient(110% 70% at 0% 5%, #F0E7DC 0%, transparent 50%),
      var(--cream);
    color: var(--ink); min-height: 100vh; line-height: 1.55;
  }
  .wrap { max-width: 480px; margin: 0 auto; padding: 28px 22px 60px; }
  .topbar { display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
  .topbar .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--clay); margin: 0 8px; }
  .kicker { font-size: 11px; letter-spacing: 0.4em; text-transform: uppercase; color: var(--clay); font-weight: 600; }
  h1 { font-family: var(--display); font-weight: 400; font-size: 62px; text-align: center; line-height: 0.9; margin: 4px 0 12px; letter-spacing: 0.01em; text-transform: uppercase; color: var(--ink); }
  h1 em { font-style: normal; color: var(--clay); }
  .subtitle { text-align: center; color: var(--ink-soft); font-size: 13.5px; font-weight: 400; letter-spacing: 0.02em; margin-bottom: 28px; }
  .section-label { font-size: 10.5px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-soft); font-weight: 600; margin-bottom: 12px; display: block; }
  .brands { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
  .chip { display: inline-flex; align-items: center; background: var(--paper); border: 1px solid var(--line); padding: 7px 14px; border-radius: 100px; font-size: 13px; font-weight: 500; color: var(--ink); }
  .filter-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn { background: var(--paper); border: 1px solid var(--line); border-radius: 100px; padding: 7px 16px; font-family: var(--body); font-size: 12px; font-weight: 600; color: var(--ink-soft); cursor: pointer; transition: all .2s; letter-spacing: 0.04em; }
  .filter-btn.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }
  .filter-btn:hover:not(.active) { border-color: var(--clay-soft); color: var(--clay); }
  .refresh-btn { margin-left: auto; background: transparent; border: 1px solid var(--line); border-radius: 100px; padding: 7px 16px; font-family: var(--body); font-size: 12px; font-weight: 600; color: var(--ink-soft); cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 6px; }
  .refresh-btn:hover { border-color: var(--clay-soft); color: var(--clay); }
  .refresh-btn .spin { width: 12px; height: 12px; border: 2px solid var(--clay-soft); border-top-color: var(--clay); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .meta-row { display: flex; justify-content: space-between; align-items: center; margin: 0 2px 16px; min-height: 18px; }
  .results-count { font-size: 12px; color: var(--ink-soft); letter-spacing: 0.05em; font-weight: 500; }
  .results-count b { color: var(--clay); font-weight: 700; }
  .last-checked { font-size: 11px; color: #B5A89B; font-weight: 400; }
  .deals { display: flex; flex-direction: column; gap: 14px; }
  .deal { background: var(--paper); border: 1px solid var(--line); border-radius: 20px; padding: 18px 19px; position: relative; overflow: hidden; box-shadow: 0 4px 18px -10px var(--shadow); animation: rise .45s ease backwards; transition: transform .2s, box-shadow .2s; }
  .deal:hover { transform: translateY(-2px); box-shadow: 0 10px 26px -12px var(--shadow); }
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  .deal::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: linear-gradient(var(--clay-soft), var(--gold)); }
  .deal-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
  .deal-brand { font-family: var(--display); font-size: 22px; font-weight: 400; letter-spacing: 0.01em; text-transform: uppercase; line-height: 1; color: var(--ink); }
  .new-tag { background: var(--new); color: #FFF6F0; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; padding: 4px 9px; border-radius: 100px; flex-shrink: 0; margin-top: 3px; animation: glow 2s ease infinite; }
  @keyframes glow { 0%,100% { box-shadow: 0 0 0 0 rgba(181,112,79,.45);} 50% { box-shadow: 0 0 0 5px rgba(181,112,79,0);} }
  .deal-discount { display: inline-block; font-size: 13px; font-weight: 700; color: var(--clay); background: #F4E6DD; padding: 3px 11px; border-radius: 100px; margin-bottom: 9px; letter-spacing: 0.02em; }
  .deal-title { font-size: 14.5px; color: var(--ink); margin-bottom: 5px; font-weight: 500; }
  .deal-details { font-size: 13px; color: var(--ink-soft); font-weight: 400; line-height: 1.5; }
  .deal-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding-top: 13px; border-top: 1px solid var(--line); }
  .deal-retailer { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-soft); font-weight: 600; }
  .deal-link { font-size: 12px; color: var(--clay); text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; transition: gap .2s; }
  .deal-link:hover { gap: 9px; }
  .deal-until { font-size: 11px; color: var(--gold); font-weight: 600; margin-top: 6px; letter-spacing: 0.02em; }
  .state { text-align: center; padding: 50px 20px; color: var(--ink-soft); }
  .state .mark { font-size: 44px; color: var(--clay-soft); margin-bottom: 14px; line-height: 1; }
  .state p { font-size: 14px; font-weight: 400; line-height: 1.6; }
  .state .small { font-size: 12px; color: #B5A89B; margin-top: 6px; }
  .skeleton { background: var(--paper); border: 1px solid var(--line); border-radius: 20px; padding: 18px 19px; }
  .sk-line { height: 12px; border-radius: 6px; background: linear-gradient(90deg, var(--cream-deep) 25%, var(--sand) 50%, var(--cream-deep) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; margin-bottom: 10px; }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .notice { background: #F0F6F0; border: 1px solid #C5D9C5; border-radius: 12px; padding: 12px 16px; margin-bottom: 20px; font-size: 12.5px; color: #4A6B4A; line-height: 1.6; }
  .notice b { color: #3A5B3A; }
  .your-products-section { background: #FFF0E6; border: 1px solid #D4A88A; border-radius: 16px; padding: 18px 19px; margin-bottom: 24px; }
  .your-products-label { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: #8B6B4A; font-weight: 700; margin-bottom: 12px; display: block; }
  .product-match-tag { display: inline-block; background: #8B6B4A; color: white; font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 100px; margin-bottom: 6px; letter-spacing: 0.05em; }
  .footnote { text-align: center; font-size: 11px; color: #BCAE9F; margin-top: 34px; font-weight: 400; line-height: 1.6; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><span class="dot"></span><span class="kicker">Curated Beauty Sales</span><span class="dot"></span></div>
  <h1>Sale <em>Petal</em></h1>
  <p class="subtitle">Your favorite brands, on sale — all in one quiet place.</p>

  <span class="section-label">Tracked Brands</span>
  <div class="brands">
    <span class="chip">Lancôme</span>
    <span class="chip">Dr. Jart+</span>
    <span class="chip">Hourglass</span>
    <span class="chip">Patrick Ta</span>
  </div>

  <div class="your-products-section" id="productMatchSection" style="display:none"></div>

  <div class="filter-row">
    <button class="filter-btn active" data-store="all">All Stores</button>
    <button class="filter-btn" data-store="Sephora">Sephora</button>
    <button class="filter-btn" data-store="Ulta">Ulta</button>
    <button class="filter-btn" data-store="Amazon">Amazon</button>
    <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
  </div>

  <div class="meta-row">
    <span class="results-count" id="count"></span>
    <span class="last-checked" id="lastChecked"></span>
  </div>

  <div class="deals" id="deals">
    <div class="skeleton"><div class="sk-line" style="width:40%"></div><div class="sk-line" style="width:28%"></div><div class="sk-line" style="width:80%"></div></div>
    <div class="skeleton"><div class="sk-line" style="width:35%"></div><div class="sk-line" style="width:22%"></div><div class="sk-line" style="width:70%"></div></div>
    <div class="skeleton"><div class="sk-line" style="width:45%"></div><div class="sk-line" style="width:30%"></div><div class="sk-line" style="width:75%"></div></div>
  </div>

  <p class="footnote">Deals are checked every 4 hours automatically.<br>Always confirm the price on the retailer's site before buying.</p>
</div>

<script>
  let allDeals = [];
  let activeStore = 'all';
  let seenIds = new Set(JSON.parse(localStorage.getItem('sp:seen') || '[]'));

  function esc(s) {
    return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function dealId(d) {
    return (d.brand + '|' + d.retailer + '|' + (d.title||'')).toLowerCase().replace(/\s+/g,'');
  }

  function renderDeals(deals) {
    const el = document.getElementById('deals');
    const filtered = activeStore === 'all' ? deals : deals.filter(d => d.retailer === activeStore);

    document.getElementById('count').innerHTML = filtered.length
      ? '<b>' + filtered.length + '</b> deal' + (filtered.length !== 1 ? 's' : '')
      : '';

    if (!filtered.length) {
      el.innerHTML = '<div class="state"><div class="mark">&#10047;</div><p>No deals right now for these brands.</p><p class="small">The scraper checks every 4 hours — check back soon.</p></div>';
      return;
    }

    el.innerHTML = '';
    filtered.forEach((d, i) => {
      const id = dealId(d);
      const isNew = !seenIds.has(id);
      const url = d.url && /^https?:\/\//i.test(d.url) ? d.url : '#';
      const card = document.createElement('div');
      card.className = 'deal';
      card.style.animationDelay = (i * 0.05) + 's';
      card.innerHTML =
        '<div class="deal-top"><span class="deal-brand">' + esc(d.brand) + '</span>' +
        (isNew ? '<span class="new-tag">New</span>' : '') + '</div>' +
        (d.discount ? '<span class="deal-discount">' + esc(d.discount) + '</span>' : '') +
        (d.title ? '<div class="deal-title">' + esc(d.title) + '</div>' : '') +
        (d.details ? '<div class="deal-details">' + esc(d.details) + '</div>' : '') +
        (d.validUntil ? '<div class="deal-until">Through ' + esc(d.validUntil) + '</div>' : '') +
        '<div class="deal-foot"><span class="deal-retailer">' + esc(d.retailer || '') + '</span>' +
        '<a class="deal-link" href="' + esc(url) + '" target="_blank" rel="noopener">View deal &#8594;</a></div>';
      el.appendChild(card);
      seenIds.add(id);
    });
    localStorage.setItem('sp:seen', JSON.stringify([...seenIds]));
  }

  function renderProductMatches(deals) {
    const matches = deals.filter(d => d.matched_products && d.matched_products.length);
    const section = document.getElementById('productMatchSection');
    if (!matches.length) { section.innerHTML = ''; section.style.display = 'none'; return; }
    section.style.display = 'block';

    let html = '<span class="your-products-label">Your Refill Products on Sale</span>';
    matches.forEach((d, i) => {
      const url = d.url && /^https?:\/\//i.test(d.url) ? d.url : '#';
      html += `<div class="deal" style="background:#FFF5EE;border-left-color:#8B6B4A;animation-delay:${i*0.05}s">
        <span class="product-match-tag">Your Product: ${esc(d.matched_products.join(', '))}</span>
        <div class="deal-top"><span class="deal-brand">${esc(d.brand)}</span></div>
        ${d.discount ? `<span class="deal-discount">${esc(d.discount)}</span>` : ''}
        ${d.title ? `<div class="deal-title">${esc(d.title)}</div>` : ''}
        ${d.details ? `<div class="deal-details">${esc(d.details)}</div>` : ''}
        <div class="deal-foot">
          <span class="deal-retailer">${esc(d.retailer||'')}</span>
          <a class="deal-link" href="${esc(url)}" target="_blank" rel="noopener">View deal &#8594;</a>
        </div>
      </div>`;
    });
    section.innerHTML = html;
  }

  async function loadDeals(showSpinner) {
    const btn = document.getElementById('refreshBtn');
    if (showSpinner) btn.innerHTML = '<span class="spin"></span> Checking…';

    try {
      const r = await fetch('deals.json?t=' + Date.now());
      if (!r.ok) throw new Error('fetch failed');
      const data = await r.json();
      allDeals = data.deals || [];

      if (data.updatedAt) {
        const d = new Date(data.updatedAt);
        document.getElementById('lastChecked').textContent = 'Updated ' +
          d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ' · ' +
          d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
      }
      renderProductMatches(allDeals);
      renderDeals(allDeals);
    } catch (e) {
      if (!allDeals.length) {
        document.getElementById('deals').innerHTML =
          '<div class="state"><div class="mark">&#10047;</div><p>Couldn\'t load deals right now.</p><p class="small">Try refreshing in a moment.</p></div>';
      }
    } finally {
      btn.innerHTML = '↻ Refresh';
    }
  }

  // Store filter buttons
  document.querySelectorAll('.filter-btn[data-store]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-store]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeStore = btn.dataset.store;
      renderDeals(allDeals);
    });
  });

  document.getElementById('refreshBtn').addEventListener('click', () => loadDeals(true));

  // Auto-refresh every 30 minutes
  loadDeals(false);
  setInterval(() => loadDeals(false), 30 * 60 * 1000);
</script>
</body>
</html>
